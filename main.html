<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Все заметки</title>
<style>
body { background: #1f1f1f; color: white; font-family: Arial; text-align: center; padding-top: 50px; }
.note { background: #2a2a2a; padding: 15px; margin: 15px auto; width: 400px; border-radius: 6px; text-align: left; }
button { padding: 10px 20px; margin: 10px 5px 0 0; border: 2px solid #00bcd4; background: transparent; color: #00bcd4; cursor: pointer; transition: 0.3s; border-radius: 6px; }
button:hover { box-shadow: inset 0 0 0 100px #00bcd4; color: #1f1f1f; }
    html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    background: #000;
}

.glow-on-hover {
    width: 220px;
    height: 50px;
    border: none;
    outline: none;
    color: #fff;
    background: #111;
    cursor: pointer;
    position: relative;
    z-index: 0;
    border-radius: 10px;
}

.glow-on-hover:before {
    content: '';
    background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
    position: absolute;
    top: -2px;
    left:-2px;
    background-size: 400%;
    z-index: -1;
    filter: blur(5px);
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    animation: glowing 20s linear infinite;
    opacity: 0;
    transition: opacity .3s ease-in-out;
    border-radius: 10px;
}

.glow-on-hover:active {
    color: #000
}

.glow-on-hover:active:after {
    background: transparent;
}

.glow-on-hover:hover:before {
    opacity: 1;
}

.glow-on-hover:after {
    z-index: -1;
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: #111;
    left: 0;
    top: 0;
    border-radius: 10px;
}

@keyframes glowing {
    0% { background-position: 0 0; }
    50% { background-position: 400% 0; }
    100% { background-position: 0 0; }
}
</style>
</head>
<body>

<h1>Ваши заметки</h1>

<div id="result"></div>

<button class="glow-on-hover" type="button">На главную</button>

<script>
const API = "http://127.0.0.1:8000";

async function getNotes() {
    const res = await fetch(`${API}/notes`);
    const data = await res.json();
    const result = document.getElementById("result");
    result.innerHTML = "";

    data.forEach(note => {
        result.innerHTML += `<div class="note">
            <h3>${note.title}</h3>
            <p>${note.content}</p>
            <small>ID: ${note.id}</small><br>
            <button onclick="deleteNote(${note.id})">Удалить</button>
            <button onclick="updateNote()">Изменить</button>
        </div>`;
    });
}


async function deleteNote(id) {
    if (!confirm("Удалить заметку?")) return;
    const res = await fetch(`${API}/notes/${id}`, { method: "DELETE" });
    if (res.status === 404) { alert("Заметка не найдена"); return; }
    alert("Заметка удалена!");
    getNotes();
}


async function updateNote(id) {

    const res = await fetch(`${API}/notes/${id}`);
    if (!res.ok) {
        alert("Заметка не найдена");
        return;
    }

    const note = await res.json();

    const newTitle = prompt("Новый заголовок:", note.title);
    if (newTitle === null) return;

    const newContent = prompt("Новый текст:", note.content);
    if (newContent === null) return;

    const response = await fetch(`${API}/notes/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: newTitle,
            content: newContent
        })
    });

    if (response.ok) {
        alert("Заметка изменена!");
        getNotes();
    } else {
        alert("Ошибка при изменении");
    }
}


getNotes();
</script>

</body>
</html>
